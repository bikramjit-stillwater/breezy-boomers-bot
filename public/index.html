<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Freo Member Voices 🏉</title>
<style>
  :root {
    --freo: #2a0a4a;
    --freo-light: #4b2a6b;
    --accent: #b89cd6;
    --bg: #f5f3f8;
    --bot-bubble: #ffffff;
    --user-bubble: #2a0a4a;
    --live: #e0457b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: #1a1a1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--freo);
    color: #fff;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; white-space: nowrap; }
  header .controls { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .ctl-label { font-size: 11px; color: var(--accent); margin-right: -4px; text-transform: uppercase; letter-spacing: 0.5px; }
  select {
    background: var(--freo-light);
    color: #fff;
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
  }
  button.icon {
    background: var(--freo-light);
    color: #fff;
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
  }
  button.icon.active { background: var(--accent); color: var(--freo); }
  button.icon:hover { filter: brightness(1.1); }
  button.reset {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 14px;
  }
  button.reset:hover { background: var(--freo-light); }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .msg.bot .bubble {
    background: var(--bot-bubble);
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.thinking { color: #888; font-style: italic; }
  .speak-btn {
    background: none; border: none; cursor: pointer; font-size: 13px;
    color: var(--freo-light); margin-top: 6px; padding: 0; opacity: 0.7;
  }
  .speak-btn:hover { opacity: 1; }
  footer {
    padding: 14px 20px;
    background: #fff;
    border-top: 1px solid #e2dded;
  }
  .inputrow {
    display: flex;
    gap: 10px;
    max-width: 820px;
    margin: 0 auto;
    align-items: flex-end;
  }
  #input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #d4cce0;
    border-radius: 12px;
    font-size: 15px;
    resize: none;
    font-family: inherit;
  }
  #input:focus { outline: none; border-color: var(--accent); }
  #mic {
    background: #fff; color: var(--freo);
    border: 1px solid #d4cce0; border-radius: 12px;
    width: 48px; height: 46px; font-size: 20px; cursor: pointer;
    flex-shrink: 0;
  }
  #mic.listening {
    background: var(--live); color: #fff; border-color: var(--live);
    animation: pulse 1.2s infinite;
  }
  #mic:disabled { opacity: 0.4; cursor: not-allowed; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(224,69,123,0.5); }
    70% { box-shadow: 0 0 0 10px rgba(224,69,123,0); }
    100% { box-shadow: 0 0 0 0 rgba(224,69,123,0); }
  }
  #send {
    background: var(--freo);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 0 22px;
    height: 46px;
    font-size: 15px;
    cursor: pointer;
    font-weight: 600;
    flex-shrink: 0;
  }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  .hint { text-align: center; color: #999; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
  <header>
    <h1>🏉 Freo Member Voices</h1>
    <div class="controls">
      <select id="persona" title="Which member persona"></select>
      <select id="mode" title="Answer mode">
        <option value="auto">auto</option>
        <option value="persona">persona</option>
        <option value="analyst">analyst</option>
      </select>
      <span class="ctl-label">Voice</span>
      <select id="gender" title="Voice gender">
        <option value="female">Female</option>
        <option value="male">Male</option>
      </select>
      <button class="icon active" id="speakerBtn" title="Toggle voice replies">🔊</button>
      <button class="reset" id="resetBtn">Reset</button>
    </div>
  </header>

  <div id="log"></div>

  <footer>
    <div class="inputrow">
      <textarea id="input" rows="1" placeholder="Ask about membership, attendance, merch…"></textarea>
      <button id="mic" title="Speak your question">🎤</button>
      <button id="send">Send</button>
    </div>
    <div class="hint">Press Enter to send · Shift+Enter for a new line · 🎤 to speak · 🔊 to hear replies</div>
  </footer>

<script>
  const log = document.getElementById("log");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const micBtn = document.getElementById("mic");
  const personaSel = document.getElementById("persona");
  const modeSel = document.getElementById("mode");
  const genderSel = document.getElementById("gender");
  const speakerBtn = document.getElementById("speakerBtn");
  const resetBtn = document.getElementById("resetBtn");
  const sessionId = "web_" + Math.random().toString(36).slice(2);

  let ttsOn = true;

  // ---- Load personas ----
  fetch("/personas").then(r => r.json()).then(d => {
    d.personas.forEach(p => {
      const o = document.createElement("option");
      o.value = p; o.textContent = p;
      personaSel.appendChild(o);
    });
  });

  // ---------------------------------------------------------------------------
  // Text-to-speech (voice output)
  // ---------------------------------------------------------------------------
  const synth = window.speechSynthesis;
  let voices = [];
  function loadVoices() { if (synth) voices = synth.getVoices(); }
  if (synth) {
    loadVoices();
    synth.onvoiceschanged = loadVoices;
  }

  // Heuristic gender → concrete voice (the Web Speech API has no gender field,
  // so we match on well-known voice names across Chrome / Edge / Safari).
  function pickVoice(gender) {
    if (!voices.length) loadVoices();
    const en = voices.filter(v => /en[-_]/i.test(v.lang));
    const pool = en.length ? en : voices;
    const femaleHints = ["female","zira","aria","jenny","susan","samantha","karen",
      "catherine","fiona","moira","tessa","serena","google uk english female","google us english"];
    const maleHints = ["male","david","mark","guy","daniel","alex","george","james",
      "fred","google uk english male"];
    const hints = gender === "male" ? maleHints : femaleHints;
    for (const h of hints) {
      const m = pool.find(v => v.name.toLowerCase().includes(h));
      if (m) return m;
    }
    return pool[0] || null;
  }

  function speak(text) {
    if (!ttsOn || !synth || !text) return;
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const v = pickVoice(genderSel.value);
    if (v) { u.voice = v; u.lang = v.lang; } else { u.lang = "en-AU"; }
    u.rate = 1; u.pitch = 1;
    synth.speak(u);
  }

  speakerBtn.addEventListener("click", () => {
    ttsOn = !ttsOn;
    speakerBtn.classList.toggle("active", ttsOn);
    speakerBtn.textContent = ttsOn ? "🔊" : "🔇";
    speakerBtn.title = ttsOn ? "Voice replies on" : "Voice replies off";
    if (!ttsOn && synth) synth.cancel();
  });

  // ---------------------------------------------------------------------------
  // Speech-to-text (voice input)
  // ---------------------------------------------------------------------------
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let listening = false;

  if (SR) {
    recognition = new SR();
    recognition.lang = "en-AU";
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onresult = (e) => {
      let transcript = "";
      for (let i = 0; i < e.results.length; i++) transcript += e.results[i][0].transcript;
      input.value = transcript;
      autoGrow();
      // Auto-send once the final result is in.
      if (e.results[e.results.length - 1].isFinal) {
        stopListening();
        if (transcript.trim()) send();
      }
    };
    recognition.onerror = () => stopListening();
    recognition.onend = () => stopListening();
  } else {
    micBtn.disabled = true;
    micBtn.title = "Voice input not supported in this browser (try Chrome or Edge)";
  }

  function startListening() {
    if (!recognition || listening) return;
    if (synth) synth.cancel(); // don't talk over the user
    try { recognition.start(); } catch (_) { return; }
    listening = true;
    micBtn.classList.add("listening");
  }
  function stopListening() {
    if (!recognition) return;
    listening = false;
    micBtn.classList.remove("listening");
    try { recognition.stop(); } catch (_) {}
  }
  micBtn.addEventListener("click", () => (listening ? stopListening() : startListening()));

  // ---------------------------------------------------------------------------
  // Chat UI
  // ---------------------------------------------------------------------------
  function addBubble(text, who, opts = {}) {
    const msg = document.createElement("div");
    msg.className = "msg " + who;
    const wrap = document.createElement("div");
    const bubble = document.createElement("div");
    bubble.className = "bubble" + (opts.thinking ? " thinking" : "");
    bubble.textContent = text;
    wrap.appendChild(bubble);
    msg.appendChild(wrap);
    log.appendChild(msg);
    log.scrollTop = log.scrollHeight;
    return { bubble, wrap };
  }

  function addSpeakButton(wrap, getText) {
    if (!synth) return;
    const b = document.createElement("button");
    b.className = "speak-btn";
    b.textContent = "🔊 Replay";
    b.addEventListener("click", () => { const prev = ttsOn; ttsOn = true; speak(getText()); ttsOn = prev; });
    wrap.appendChild(b);
  }

  function autoGrow() {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 140) + "px";
  }
  input.addEventListener("input", autoGrow);

  async function send() {
    const message = input.value.trim();
    if (!message) return;
    input.value = ""; autoGrow();
    sendBtn.disabled = true;

    addBubble(message, "user");
    const { bubble: botBubble, wrap } = addBubble("…", "bot", { thinking: true });

    try {
      const res = await fetch("/chat/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message,
          sessionId,
          persona: personaSel.value,
          mode: modeSel.value,
        }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let full = "";
      let first = true;

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n\n");
        buffer = lines.pop();
        for (const line of lines) {
          const trimmed = line.replace(/^data:\s?/, "").trim();
          if (!trimmed) continue;
          let evt;
          try { evt = JSON.parse(trimmed); } catch { continue; }
          if (evt.token) {
            if (first) { botBubble.textContent = ""; botBubble.classList.remove("thinking"); first = false; }
            full += evt.token;
            botBubble.textContent = full;
            log.scrollTop = log.scrollHeight;
          } else if (evt.error) {
            botBubble.classList.remove("thinking");
            botBubble.textContent = "⚠️ " + evt.error;
          }
        }
      }
      if (first) { botBubble.classList.remove("thinking"); botBubble.textContent = full || "(no response)"; }
      if (full) { addSpeakButton(wrap, () => full); speak(full); }
    } catch (err) {
      botBubble.classList.remove("thinking");
      botBubble.textContent = "⚠️ " + err.message;
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  resetBtn.addEventListener("click", async () => {
    if (synth) synth.cancel();
    await fetch("/reset", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId }),
    });
    log.innerHTML = "";
    addBubble("History cleared. Ask me anything!", "bot");
  });

  addBubble("G'day! Pick a member persona up top, then type or tap 🎤 to speak. I'll answer in their voice.", "bot");
  input.focus();
</script>
</body>
</html>
