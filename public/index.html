<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Breezy Boomers Bot 🏉</title>
<style>
  :root { --freo:#2a0a4a; --freo-light:#4b2a6b; --accent:#b89cd6; --bg:#f5f3f8; --live:#e0457b; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:#1a1a1a; height:100vh; display:flex; flex-direction:column; }
  header { background:var(--freo); color:#fff; padding:12px 18px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:18px; margin:0; font-weight:600; white-space:nowrap; }
  header .sub { font-size:12px; color:var(--accent); }
  header .controls { margin-left:auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .ctl-label { font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:.5px; }
  select { background:var(--freo-light); color:#fff; border:1px solid var(--accent); border-radius:8px; padding:6px 10px; font-size:14px; }
  button.icon { background:var(--freo-light); color:#fff; border:1px solid var(--accent); border-radius:8px; padding:6px 10px; cursor:pointer; font-size:15px; line-height:1; }
  button.icon.active { background:var(--accent); color:var(--freo); }
  button.reset { background:transparent; color:var(--accent); border:1px solid var(--accent); border-radius:8px; padding:6px 12px; cursor:pointer; font-size:14px; }
  #log { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; max-width:820px; width:100%; margin:0 auto; }
  .msg { display:flex; } .msg.user { justify-content:flex-end; }
  .bubble { max-width:78%; padding:12px 16px; border-radius:16px; line-height:1.5; white-space:pre-wrap; word-wrap:break-word; box-shadow:0 1px 2px rgba(0,0,0,.08); }
  .msg.bot .bubble { background:#fff; border-bottom-left-radius:4px; }
  .msg.user .bubble { background:var(--freo); color:#fff; border-bottom-right-radius:4px; }
  .bubble.thinking { color:#888; font-style:italic; }
  .speak-btn { background:none; border:none; cursor:pointer; font-size:13px; color:var(--freo-light); margin-top:6px; padding:0; opacity:.7; }
  .speak-btn:hover { opacity:1; }
  .suggest { max-width:820px; margin:0 auto; padding:0 20px; display:flex; gap:8px; flex-wrap:wrap; }
  .chip { background:#fff; border:1px solid #d4cce0; border-radius:16px; padding:6px 12px; font-size:13px; cursor:pointer; color:var(--freo); }
  .chip:hover { background:var(--accent); color:#fff; }
  footer { padding:14px 20px; background:#fff; border-top:1px solid #e2dded; }
  .inputrow { display:flex; gap:10px; max-width:820px; margin:0 auto; align-items:flex-end; }
  #input { flex:1; padding:12px 16px; border:1px solid #d4cce0; border-radius:12px; font-size:15px; resize:none; font-family:inherit; }
  #input:focus { outline:none; border-color:var(--accent); }
  #mic { background:#fff; color:var(--freo); border:1px solid #d4cce0; border-radius:12px; width:48px; height:46px; font-size:20px; cursor:pointer; flex-shrink:0; }
  #mic.listening { background:var(--live); color:#fff; border-color:var(--live); animation:pulse 1.2s infinite; }
  #mic:disabled { opacity:.4; cursor:not-allowed; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(224,69,123,.5);} 70%{box-shadow:0 0 0 10px rgba(224,69,123,0);} 100%{box-shadow:0 0 0 0 rgba(224,69,123,0);} }
  #send { background:var(--freo); color:#fff; border:none; border-radius:12px; padding:0 22px; height:46px; font-size:15px; cursor:pointer; font-weight:600; flex-shrink:0; }
  .hint { text-align:center; color:#999; font-size:12px; margin-top:8px; }
</style>
</head>
<body>
  <header>
    <div><h1>🏉 Breezy Boomers Bot</h1><div class="sub">chatting as Robert &amp; Susan</div></div>
    <div class="controls">
      <select id="mode" title="Answer mode">
        <option value="auto">auto</option>
        <option value="persona">persona</option>
        <option value="analyst">analyst</option>
      </select>
      <span class="ctl-label">Voice</span>
      <select id="gender" title="Voice gender"><option value="male">Male</option><option value="female">Female</option></select>
      <button class="icon active" id="speakerBtn" title="Toggle voice replies">🔊</button>
      <button class="reset" id="resetBtn">Reset</button>
    </div>
  </header>

  <div id="log"></div>
  <div class="suggest" id="suggest"></div>

  <footer>
    <div class="inputrow">
      <textarea id="input" rows="1" placeholder="Ask Robert about membership, footy, merch…"></textarea>
      <button id="mic" title="Speak your question">🎤</button>
      <button id="send">Send</button>
    </div>
    <div class="hint">Enter to send · Shift+Enter newline · 🎤 speak · 🔊 hear replies</div>
  </footer>

<script>
  const log=document.getElementById("log"), input=document.getElementById("input"),
        sendBtn=document.getElementById("send"), micBtn=document.getElementById("mic"),
        modeSel=document.getElementById("mode"), genderSel=document.getElementById("gender"),
        speakerBtn=document.getElementById("speakerBtn"), resetBtn=document.getElementById("resetBtn"),
        suggest=document.getElementById("suggest");
  const sessionId="web_"+Math.random().toString(36).slice(2);
  let ttsOn=true;

  const QUESTIONS=[
    "What type of membership do you hold, and why did you choose it?",
    "How often do you attend games in person versus from home?",
    "How much do you spend on club merchandise each season?",
    "How do you feel about the price of your membership?",
    "Who do you usually come to the footy with?"
  ];
  QUESTIONS.forEach(q=>{ const c=document.createElement("div"); c.className="chip"; c.textContent=q;
    c.onclick=()=>{ input.value=q; send(); }; suggest.appendChild(c); });

  // ---- Text to speech ----
  const synth=window.speechSynthesis; let voices=[];
  function loadVoices(){ if(synth) voices=synth.getVoices(); }
  if(synth){ loadVoices(); synth.onvoiceschanged=loadVoices; }
  function pickVoice(g){ if(!voices.length) loadVoices();
    const en=voices.filter(v=>/en[-_]/i.test(v.lang)); const pool=en.length?en:voices;
    const fem=["female","zira","aria","jenny","susan","samantha","karen","catherine","fiona","moira","tessa","google uk english female","google us english"];
    const male=["male","david","mark","guy","daniel","alex","george","james","fred","google uk english male"];
    for(const h of (g==="female"?fem:male)){ const m=pool.find(v=>v.name.toLowerCase().includes(h)); if(m) return m; }
    return pool[0]||null; }
  function speak(t){ if(!ttsOn||!synth||!t) return; synth.cancel();
    const u=new SpeechSynthesisUtterance(t); const v=pickVoice(genderSel.value);
    if(v){u.voice=v;u.lang=v.lang;} else u.lang="en-AU"; synth.speak(u); }
  speakerBtn.onclick=()=>{ ttsOn=!ttsOn; speakerBtn.classList.toggle("active",ttsOn);
    speakerBtn.textContent=ttsOn?"🔊":"🔇"; if(!ttsOn&&synth) synth.cancel(); };

  // ---- Speech to text ----
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition; let recognition=null,listening=false;
  if(SR){ recognition=new SR(); recognition.lang="en-AU"; recognition.interimResults=true; recognition.continuous=false;
    recognition.onresult=e=>{ let t=""; for(let i=0;i<e.results.length;i++) t+=e.results[i][0].transcript;
      input.value=t; autoGrow(); if(e.results[e.results.length-1].isFinal){ stopListening(); if(t.trim()) send(); } };
    recognition.onerror=stopListening; recognition.onend=stopListening;
  } else { micBtn.disabled=true; micBtn.title="Voice input needs Chrome or Edge"; }
  function startListening(){ if(!recognition||listening) return; if(synth) synth.cancel();
    try{ recognition.start(); }catch(_){ return; } listening=true; micBtn.classList.add("listening"); }
  function stopListening(){ if(!recognition) return; listening=false; micBtn.classList.remove("listening"); try{ recognition.stop(); }catch(_){} }
  micBtn.onclick=()=> listening?stopListening():startListening();

  // ---- Chat ----
  function addBubble(text,who,opts={}){ const m=document.createElement("div"); m.className="msg "+who;
    const wrap=document.createElement("div"); const b=document.createElement("div");
    b.className="bubble"+(opts.thinking?" thinking":""); b.textContent=text; wrap.appendChild(b);
    m.appendChild(wrap); log.appendChild(m); log.scrollTop=log.scrollHeight; return {bubble:b,wrap}; }
  function addSpeak(wrap,getText){ if(!synth) return; const b=document.createElement("button");
    b.className="speak-btn"; b.textContent="🔊 Replay"; b.onclick=()=>{ const p=ttsOn; ttsOn=true; speak(getText()); ttsOn=p; }; wrap.appendChild(b); }
  function autoGrow(){ input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,140)+"px"; }
  input.addEventListener("input",autoGrow);

  async function send(){
    const message=input.value.trim(); if(!message) return;
    input.value=""; autoGrow(); sendBtn.disabled=true;
    addBubble(message,"user");
    const {bubble,wrap}=addBubble("…","bot",{thinking:true});
    try{
      const res=await fetch("/chat/stream",{ method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ message, sessionId, mode:modeSel.value }) });
      const reader=res.body.getReader(); const dec=new TextDecoder();
      let buf="", full="", first=true;
      while(true){ const {value,done}=await reader.read(); if(done) break;
        buf+=dec.decode(value,{stream:true}); const parts=buf.split("\n\n"); buf=parts.pop();
        for(const line of parts){ const tr=line.replace(/^data:\s?/,"").trim(); if(!tr) continue;
          let evt; try{ evt=JSON.parse(tr); }catch{ continue; }
          if(evt.token){ if(first){ bubble.textContent=""; bubble.classList.remove("thinking"); first=false; }
            full+=evt.token; bubble.textContent=full; log.scrollTop=log.scrollHeight; }
          else if(evt.error){ bubble.classList.remove("thinking"); bubble.textContent="⚠️ "+evt.error; } } }
      if(first){ bubble.classList.remove("thinking"); bubble.textContent=full||"(no response)"; }
      if(full){ addSpeak(wrap,()=>full); speak(full); }
    }catch(err){ bubble.classList.remove("thinking"); bubble.textContent="⚠️ "+err.message; }
    finally{ sendBtn.disabled=false; input.focus(); }
  }
  sendBtn.onclick=send;
  input.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send(); } });
  resetBtn.onclick=async()=>{ if(synth) synth.cancel();
    await fetch("/reset",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({sessionId}) });
    log.innerHTML=""; addBubble("Righto, fresh start. What would you like to know?","bot"); };

  addBubble("G'day! I'm a Breezy Boomers member — think Robert or Susan. Ask me about my membership, getting to the footy, merch, or anything Freo. Tap a question below or type your own.","bot");
  input.focus();
</script>
</body>
</html>
