<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Breezy Boomers Bot 🏉</title>
<style>
  :root {
    --freo: #2a0a4a;
    --freo-light: #4b2a6b;
    --accent: #b89cd6;
    --bg: #f5f3f8;
    --bot-bubble: #ffffff;
    --user-bubble: #2a0a4a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: #1a1a1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--freo);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .controls { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  select {
    background: var(--freo-light);
    color: #fff;
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
  }
  button.reset {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 14px;
  }
  button.reset:hover { background: var(--freo-light); }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .msg.bot .bubble {
    background: var(--bot-bubble);
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.thinking { color: #888; font-style: italic; }
  footer {
    padding: 14px 20px;
    background: #fff;
    border-top: 1px solid #e2dded;
  }
  .inputrow {
    display: flex;
    gap: 10px;
    max-width: 820px;
    margin: 0 auto;
  }
  #input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #d4cce0;
    border-radius: 12px;
    font-size: 15px;
    resize: none;
    font-family: inherit;
  }
  #input:focus { outline: none; border-color: var(--accent); }
  #send {
    background: var(--freo);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 0 22px;
    font-size: 15px;
    cursor: pointer;
    font-weight: 600;
  }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  .hint { text-align: center; color: #999; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
  <header>
    <h1>🏉 Breezy Boomers Bot</h1>
    <div class="controls">
      <select id="persona" title="Persona"></select>
      <select id="mode" title="Mode">
        <option value="auto">auto</option>
        <option value="persona">persona</option>
        <option value="analyst">analyst</option>
      </select>
      <button class="reset" id="resetBtn">Reset</button>
    </div>
  </header>

  <div id="log"></div>

  <footer>
    <div class="inputrow">
      <textarea id="input" rows="1" placeholder="Ask about membership, attendance, merch…"></textarea>
      <button id="send">Send</button>
    </div>
    <div class="hint">Press Enter to send · Shift+Enter for a new line</div>
  </footer>

<script>
  const log = document.getElementById("log");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const personaSel = document.getElementById("persona");
  const modeSel = document.getElementById("mode");
  const resetBtn = document.getElementById("resetBtn");
  const sessionId = "web_" + Math.random().toString(36).slice(2);

  // Load personas
  fetch("/personas").then(r => r.json()).then(d => {
    d.personas.forEach(p => {
      const o = document.createElement("option");
      o.value = p; o.textContent = p;
      personaSel.appendChild(o);
    });
  });

  function addBubble(text, who, opts = {}) {
    const msg = document.createElement("div");
    msg.className = "msg " + who;
    const bubble = document.createElement("div");
    bubble.className = "bubble" + (opts.thinking ? " thinking" : "");
    bubble.textContent = text;
    msg.appendChild(bubble);
    log.appendChild(msg);
    log.scrollTop = log.scrollHeight;
    return bubble;
  }

  function autoGrow() {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 140) + "px";
  }
  input.addEventListener("input", autoGrow);

  async function send() {
    const message = input.value.trim();
    if (!message) return;
    input.value = ""; autoGrow();
    sendBtn.disabled = true;

    addBubble(message, "user");
    const botBubble = addBubble("…", "bot", { thinking: true });

    try {
      const res = await fetch("/chat/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message,
          sessionId,
          persona: personaSel.value,
          mode: modeSel.value,
        }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let full = "";
      let first = true;

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n\n");
        buffer = lines.pop();
        for (const line of lines) {
          const trimmed = line.replace(/^data:\s?/, "").trim();
          if (!trimmed) continue;
          let evt;
          try { evt = JSON.parse(trimmed); } catch { continue; }
          if (evt.token) {
            if (first) { botBubble.textContent = ""; botBubble.classList.remove("thinking"); first = false; }
            full += evt.token;
            botBubble.textContent = full;
            log.scrollTop = log.scrollHeight;
          } else if (evt.error) {
            botBubble.classList.remove("thinking");
            botBubble.textContent = "⚠️ " + evt.error;
          }
        }
      }
      if (first) { botBubble.classList.remove("thinking"); botBubble.textContent = full || "(no response)"; }
    } catch (err) {
      botBubble.classList.remove("thinking");
      botBubble.textContent = "⚠️ " + err.message;
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  resetBtn.addEventListener("click", async () => {
    await fetch("/reset", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId }),
    });
    log.innerHTML = "";
    addBubble("History cleared. Ask me anything!", "bot");
  });

  addBubble("G'day! I'm the Breezy Boomers member. Ask me about my membership, going to the footy, merch — anything.", "bot");
  input.focus();
</script>
</body>
</html>
